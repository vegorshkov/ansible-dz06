---
- name: Install dependencies
  apt:
    name:
      - git
      - nginx
    state: present
    update_cache: yes
  become: true

- name: Clone lighthouse repository
  git:
    repo: "{{ lighthouse_repo }}"
    dest: "{{ lighthouse_dest }}"
    version: "{{ lighthouse_version }}"
    force: yes
  become: true

- name: Copy nginx config
  template:
    src: lighthouse.conf.j2
    dest: /etc/nginx/sites-available/lighthouse.conf
    mode: '0644'
  become: true
  notify: restart nginx

- name: Enable lighthouse site
  file:
    src: /etc/nginx/sites-available/lighthouse.conf
    dest: /etc/nginx/sites-enabled/lighthouse.conf
    state: link
  become: true
  notify: restart nginx

- name: Remove default nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  become: true
  notify: restart nginx

- name: Start nginx
  service:
    name: nginx
    state: started
    enabled: yes
  become: true

